name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Download yt-dlp.exe
        shell: pwsh
        run: |
          # yt-dlp.exe is gitignored (large binary); fetch the official build so the
          # project's copy-to-output step and the setup/portable packaging can include it.
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "yt-dlp.exe"

      - name: Download ffmpeg.exe
        shell: pwsh
        run: |
          # ffmpeg lets yt-dlp merge separate H.264 video+audio streams into a single MP4,
          # so downloaded wallpapers are always Media Foundation-playable (incl. Windows 10).
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_tmp" -Force
          $exe = Get-ChildItem -Path "ffmpeg_tmp" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item -Path $exe.FullName -Destination "ffmpeg.exe" -Force
          Remove-Item -Path "ffmpeg.zip","ffmpeg_tmp" -Recurse -Force
          Write-Host "ffmpeg.exe ready: $((Get-Item ffmpeg.exe).Length / 1MB) MB"

      - name: Restore NuGet packages
        run: nuget restore packages.config -PackagesDirectory packages

      - name: Build (Release x64)
        run: msbuild WallpaperAnimWinUI.vcxproj /p:Configuration=Release /p:Platform=x64 /m

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = & ./scripts/get-version.ps1
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "App version: $v"

      - name: Build setup executable
        shell: pwsh
        run: ./build_setup.ps1

      - name: Create portable zip
        shell: pwsh
        run: ./scripts/package-portable.ps1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WallpaperAnim-v${{ steps.ver.outputs.version }}
          path: |
            WallpaperAnimSetup.exe
            WallpaperAnim-Portable.zip
          if-no-files-found: error

      - name: Publish GitHub Release (auto, when version is new)
        # On every master push: read the version from version.h and, if no release
        # exists for it yet, create the tag + release with the Setup and Portable assets.
        # Bumping src/version.h is therefore the only manual step needed to ship.
        if: github.ref == 'refs/heads/master'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${{ steps.ver.outputs.version }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists - skipping."
          } else {
            Write-Host "Creating release $tag..."
            gh release create $tag `
              --title "Release $tag" `
              --notes "Automated release built by CI. Includes the Setup executable and a Portable zip." `
              WallpaperAnimSetup.exe WallpaperAnim-Portable.zip
          }
